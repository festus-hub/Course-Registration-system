<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
<body>
    <div>
        <h2 class="text-3xl font-bold mb-2">
            Reset Your Password
        </h2>
        <p class="mb-4">Enter your email address below, and we'll send you instructions to reset your password.</p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-purple-700">Reset Password</button>
        </form>
        <div class="mt-4">
            <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Back to Login</a>
        </div>
    </div>
</body>
</html>
