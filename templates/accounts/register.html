<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-5">

<div class="bg-white rounded-2xl shadow-2xl overflow-hidden max-w-5xl w-full grid md:grid-cols-2">

    <!-- Left Side -->
    <div class="relative hidden md:flex">

       <div>
            <img src="{% static 'images/university.png' %}"
                 alt="University campus"
                 class="absolute inset-0 w-full h-full object-cover">
        </div>

        <div class="absolute inset-0 bg-purple-700/70"></div>

        <div class="relative z-10 flex flex-col justify-between p-10 text-white h-full">

            <div>
                <h2 class="text-3xl font-bold">CourseHub</h2>
                <p>Register • Learn • Grow</p>
            </div>

            <div>
                <h1 class="text-5xl font-bold mb-5">
                    Create Your Account
                </h1>

                <p class="text-lg">
                    Join thousands of students and begin your learning journey today.
                </p>
            </div>

            <div class="text-5xl opacity-40">
                <span class="bi bi-book text-black"></span>
            </div>

        </div>

    </div>   
    <!-- Register Form -->
    <div class="p-10">

        <h2 class="text-3xl font-bold mb-2">
            Create Account
        </h2>

        <p class="text-gray-500 mb-8">
            Fill in the details below to create your account.
        </p>

        <form method="POST">
            {% csrf_token %}

            <!-- Full Name -->
            <div class="mb-4">

                <label class="block font-medium mb-2">
                    Username
                </label>

                <div class="relative">
                    <i class="fa-regular fa-user absolute left-4 top-4 text-gray-400"></i>

                    <input
                        type="text"
                        name="username"
                        placeholder="Choose a username"
                        class="w-full border rounded-lg py-3 pl-11 pr-4 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>

            </div>

            <!-- Email -->

            <div class="mb-4">

                <label class="block font-medium mb-2">
                    Email Address
                </label>

                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-4 top-4 text-gray-400"></i>

                    <input
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        class="w-full border rounded-lg py-3 pl-11 pr-4 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>

            </div>

            <!-- Role -->

            <div class="mb-4">

                <label class="block font-medium mb-2">
                    Account Type
                </label>

               <label for="role" class="block text-sm font-medium text-gray-700 mb-2">Role</label>
                <select id="role" name="role" class="w-full border rounded-lg py-3 pl-4 pr-4 focus:ring-2 focus:ring-purple-500 outline-none" aria-label="Role">
                    <option value="student" selected>Student</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <!-- Password -->

            <div class="mb-4">

                <label class="block font-medium mb-2">
                    Password
                </label>

                <div class="relative">

                    <i class="fa-solid fa-lock absolute left-4 top-4 text-gray-400"></i>

                    <input
                        id="password"
                        type="password"
                        name="password1"
                        placeholder="Create a password"
                        class="w-full border rounded-lg py-3 pl-11 pr-11 focus:ring-2 focus:ring-purple-500 outline-none">

                    <i id="togglePassword"
                       class="fa-regular fa-eye absolute right-4 top-4 cursor-pointer text-gray-400"></i>

                </div>

            </div>

            <!-- Confirm Password -->

            <div class="mb-4">

                <label class="block font-medium mb-2">
                    Confirm Password
                </label>

                <div class="relative">

                    <i class="fa-solid fa-lock absolute left-4 top-4 text-gray-400"></i>

                    <input
                        id="confirmPassword"
                        type="password"
                        name="password2"
                        placeholder="Confirm your password"
                        class="w-full border rounded-lg py-3 pl-11 pr-11 focus:ring-2 focus:ring-purple-500 outline-none">

                    <i id="toggleConfirmPassword"
                       class="fa-regular fa-eye absolute right-4 top-4 cursor-pointer text-gray-400"></i>

                </div>

            </div>

            <!-- Terms -->

            <div class="flex items-center mb-6">

                <input id="terms" type="checkbox" required title="Agree to Terms & Conditions">

                <label for="terms" class="ml-2 text-sm">
                    I agree to the
                    <a href="#" class="text-purple-600 font-semibold">
                        Terms & Conditions
                    </a>
                </label>

            </div>

            <!-- Register Button -->

            <button type="submit"
                class="w-full bg-gradient-to-r from-purple-700 to-purple-500 text-white py-3 rounded-lg font-semibold hover:opacity-90">

                Register

            </button>

        </form>


        <!-- Login Link -->

        <p class="text-center mt-8 text-gray-500">

            Already have an account?

            <a href="{% url 'login' %}"
               class="text-purple-600 font-semibold hover:underline">

                Login

            </a>

        </p>

    </div>

</div>

<script>

function togglePassword(inputId, iconId){

    const input=document.getElementById(inputId);
    const icon=document.getElementById(iconId);

    icon.addEventListener("click",function(){

        if(input.type==="password"){
            input.type="text";
            icon.classList.replace("fa-eye","fa-eye-slash");
        }else{
            input.type="password";
            icon.classList.replace("fa-eye-slash","fa-eye");
        }

    });

}

togglePassword("password","togglePassword");
togglePassword("confirmPassword","toggleConfirmPassword");

</script>

</body>
</html>
