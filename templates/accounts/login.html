<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-5">

<div class="bg-white rounded-2xl shadow-2xl overflow-hidden max-w-5xl w-full grid md:grid-cols-2">

    <!-- Left Side -->
    <div class="relative hidden md:flex">

        <div>
            <img src="{% static 'images/university.png' %}"
                 alt="University campus"
                 class="absolute inset-0 w-full h-full object-cover">
        </div>

        <div class="absolute inset-0 bg-purple-700/70"></div>

        <div class="relative z-10 flex flex-col justify-between p-10 text-white h-full">

            <div>
                <h2 class="text-3xl font-bold">CourseHub</h2>
                <p class="text-sm">Register • Learn • Grow</p>
            </div>

            <div>
                <h1 class="text-5xl font-bold leading-tight mb-5">
                    Welcome Back!
                </h1>

                <p class="text-lg">
                    Login to access your courses,
                    track your progress and
                    achieve your goals.
                </p>
            </div>

            <div class="text-5xl opacity-40">
                <span class="bi bi-book text-black"></span>
            </div>

        </div>

    </div>

    <!-- Login Form -->
    <div class="p-10">

        <h2 class="text-3xl font-bold mb-2">
            Login to your account
        </h2>

        <p class="text-gray-500 mb-8">
            Welcome back! Please enter your details to continue.
        </p>

        <form>

            <!-- Email -->

            <div class="mb-5">

                <label class="block mb-2 font-medium">
                    Email Address
                </label>

                <div class="relative">

                    <i class="fa-regular fa-envelope absolute left-4 top-4 text-gray-400"></i>

                    <input
                        type="email"
                        placeholder="Enter your email"
                        class="w-full border rounded-lg py-3 pl-11 pr-4 outline-none focus:ring-2 focus:ring-purple-500">

                </div>

            </div>

            <!-- Password -->

            <div class="mb-5">

                <label class="block mb-2 font-medium">
                    Password
                </label>

                <div class="relative">

                    <i class="fa-solid fa-lock absolute left-4 top-4 text-gray-400"></i>

                    <input
                        id="password"
                        type="password"
                        placeholder="Enter your password"
                        class="w-full border rounded-lg py-3 pl-11 pr-11 outline-none focus:ring-2 focus:ring-purple-500">

                    <i
                        id="togglePassword"
                        class="fa-regular fa-eye absolute right-4 top-4 cursor-pointer text-gray-400"></i>

                </div>

            </div>

            <!-- Remember -->

            <div class="flex justify-between items-center mb-6">

                <label class="flex items-center gap-2">

                    <input type="checkbox">

                    <span class="text-sm">
                        Remember me
                    </span>

                </label>

                <a href="#" class="text-purple-600 text-sm hover:underline">
                    Forgot password?
                </a>

            </div>

            <!-- Button -->

            <button type="submit" class="w-full bg-gradient-to-r from-purple-700 to-purple-500 text-white py-3 rounded-lg font-semibold hover:opacity-90 transition">
                Login
            </button>

        </form>

        <!-- Divider -->

        <div class="flex items-center my-8">

            <hr class="flex-1">

            <span class="mx-4 text-gray-400 text-sm">
                or continue with
            </span>

            <hr class="flex-1">

        </div>

        <!-- Social -->

        <div class="grid grid-cols-3 gap-4">

            <button title="Continue with Google" class="border rounded-lg py-3 hover:bg-gray-50">
                <i class="fab fa-google text-red-500 text-xl"></i>
            </button>

            <button title="Continue with Facebook" class="border rounded-lg py-3 hover:bg-gray-50">
                <i class="fab fa-facebook text-blue-600 text-xl"></i>
            </button>

            <button title="Continue with Apple" class="border rounded-lg py-3 hover:bg-gray-50">
                <i class="fab fa-apple text-black text-xl"></i>
            </button>

        </div>

        <!-- Register -->

        <p class="text-center mt-8 text-gray-500">

            Don't have an account?

           <a href="{% url 'register' %}"
                          class="text-purple-600 font-semibold hover:underline">

                        Register Now
                </a>
        </p>

    </div>

</div>

<script>

const password = document.getElementById("password");
const toggle = document.getElementById("togglePassword");

toggle.addEventListener("click",function(){

    if(password.type==="password"){

        password.type="text";
        toggle.classList.remove("fa-eye");
        toggle.classList.add("fa-eye-slash");

    }else{

        password.type="password";
        toggle.classList.remove("fa-eye-slash");
        toggle.classList.add("fa-eye");

    }

});

</script>

</body>
</html>
