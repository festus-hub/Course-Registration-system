<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Registration Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-xl mx-auto bg-white rounded-xl shadow p-6">
        <h1 class="text-2xl font-bold mb-4">Update Registration Status</h1>
        <p class="text-gray-600 mb-6">
            Student: <strong>{{ registration.student.user.username }}</strong><br>
            Course: <strong>{{ registration.course.title }}</strong>
        </p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="status" class="block font-medium mb-2">Status</label>
                <select id="status" name="status" class="w-full border rounded-lg px-3 py-2">
                    <option value="pending" {% if registration.status == 'pending' %}selected{% endif %}>Pending</option>
                    <option value="approved" {% if registration.status == 'approved' %}selected{% endif %}>Approved</option>
                    <option value="rejected" {% if registration.status == 'rejected' %}selected{% endif %}>Rejected</option>
                </select>
            </div>

            <div class="flex gap-3">
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Save</button>
                <a href="{% url 'registration_list' %}" class="bg-gray-300 px-4 py-2 rounded-lg hover:bg-gray-400">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
