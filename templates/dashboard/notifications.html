{% extends 'dashboard/student_base.html' %}
{% block title %}Notifications{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-4">Notifications</h1>
    <div class="space-y-4">
        {% for notification in notifications %}
        <div class="bg-white rounded-xl shadow p-5">
            <h2 class="text-xl font-semibold">{{ notification.title }}</h2>
            <p class="text-gray-600 mt-2">{{ notification.message }}</p>
        </div>
        {% empty %}
        <div class="bg-white rounded-xl shadow p-5 text-gray-500">No notifications at this time.</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
