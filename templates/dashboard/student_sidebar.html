<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Sora', 'sans-serif'],
                    },
                    colors: {
                        violet: {
                            900: '#2E1065',
                            800: '#3E1A78',
                            700: '#4C1D95',
                            500: '#7C3AED',
                            100: '#EDE7FB',
                        },
                        ink: '#1E1B2E',
                        inksoft: '#5B5670',
                        muted: '#8B8699',
                        lime: '#B7F04C',
                    },
                    boxShadow: {
                        card: '0 1px 2px rgba(46,16,101,0.04), 0 8px 24px -12px rgba(46,16,101,0.12)',
                    },
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Sora', sans-serif; }
    </style>
</head>

 <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-64 -translate-x-full lg:translate-x-0 transition-transform duration-200 ease-in-out bg-gradient-to-b from-violet-900 to-violet-700 text-white flex flex-col relative overflow-hidden">

        <div class="absolute -top-20 -right-20 w-56 h-56 rounded-full bg-lime/20 blur-3xl pointer-events-none"></div>

        <div class="flex items-center justify-between p-6 border-b border-white/10 relative">
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-[10px] bg-lime flex items-center justify-center font-display font-extrabold text-violet-900 text-base">C</div>
                <span class="font-display text-xl font-bold tracking-tight">CourseHub</span>
            </div>
           
        </div>

        <nav class="mt-4 space-y-1 px-3 relative flex-1">

            <a href="{% url 'student_dashboard' %}" class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-[14.5px] font-medium bg-white/[0.13] text-white hover:bg-white/[0.07] hover:text-white transition-colors">
                <i class="bi bi-house text-base w-5 text-center"></i> Dashboard
            </a>

            <a href="{% url 'student_profile_view' %}" class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-[14.5px] font-medium text-white/70 hover:bg-white/[0.07] hover:text-white transition-colors">
                <i class="bi bi-person text-base w-5 text-center"></i> My Profile
            </a>

            <a href="{% url 'student_courses' %}" class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-[14.5px] font-medium text-white/70 hover:bg-white/[0.07] hover:text-white transition-colors">
                <i class="bi bi-journal-bookmark text-base w-5 text-center"></i> Available Courses
            </a>

            <a href="{% url 'register_course' %}" class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-[14.5px] font-medium text-white/70 hover:bg-white/[0.07] hover:text-white transition-colors">
                <i class="bi bi-pencil-square text-base w-5 text-center"></i> Register Courses
            </a>

            <a href="{% url 'student_registrations_view' %}" class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-[14.5px] font-medium text-white/70 hover:bg-white/[0.07] hover:text-white transition-colors">
                <i class="bi bi-list-check text-base w-5 text-center"></i> My Registered Courses
            </a>

            <div class="h-px bg-white/10 my-3 mx-1"></div>

            <a href="{% url 'student_notifications' %}" class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-[14.5px] font-medium text-white/70 hover:bg-white/[0.07] hover:text-white transition-colors">
                <i class="bi bi-bell text-base w-5 text-center"></i> Notifications
            </a>

            <a href="{% url 'registration_slip' %}" class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-[14.5px] font-medium text-white/70 hover:bg-white/[0.07] hover:text-white transition-colors">
                <i class="bi bi-file-earmark-text text-base w-5 text-center"></i> Registration Slip
            </a>

        </nav>

        <div class="px-3 pb-5 space-y-1 relative">
            <a href="{% url 'student_settings' %}" class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-[14.5px] font-medium text-white/70 hover:bg-white/[0.07] hover:text-white transition-colors">
                <i class="bi bi-gear text-base w-5 text-center"></i> Settings
            </a>
            <a href="{% url 'logout' %}" class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-[14.5px] font-medium text-white/70 hover:bg-white/[0.07] hover:text-white transition-colors">
                <i class="bi bi-box-arrow-right text-base w-5 text-center"></i> Logout
            </a>
        </div>

    </aside>
</html>
